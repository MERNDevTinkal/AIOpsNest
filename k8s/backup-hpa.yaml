apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backup-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backup
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

# Note: For custom metrics (e.g., queue depth or backup success), configure the Kubernetes Metrics Adapter and the External Metrics Provider, then use an External metric in the HPA spec.