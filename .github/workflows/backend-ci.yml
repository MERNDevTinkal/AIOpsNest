name: Backend CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    name: Install & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root deps
        run: |
          # Note: 'npm install' is used instead of 'npm ci' because the project is missing a package-lock.json.
          # In a real environment, you should generate and commit a lockfile to use 'npm ci' for deterministic builds.
          npm install
      - name: Lint
        run: npm run lint || true
      - name: Build packages
        run: |
          npm run build --workspaces
      - name: Run tests
        run: |
          # run per-app tests if present
          cd apps/auth && npm install && npm test || true

  ecr-build-push:
    name: Build & Push Docker images to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1
      - name: Build and push auth image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/auth
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_AUTH }}:latest
      - name: Build and push users image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/users
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_USERS }}:latest
      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/gateway
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_GATEWAY }}:latest
      - name: Build and push email-worker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/email-worker
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_EMAIL_WORKER }}:latest

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        run: |
          cd terraform
          terraform init
      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -var-file=terraform/terraform.tfvars || true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
