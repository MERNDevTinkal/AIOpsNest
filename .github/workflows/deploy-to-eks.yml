name: Deploy to EKS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Update kubeconfig
        uses: aws-actions/eks-update-kubeconfig@v2
        with:
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          region: ${{ secrets.AWS_REGION }}
      - name: Set image for deployments
        run: |
          kubectl set image deployment/auth-deployment auth=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_AUTH }}:latest --record || true
          kubectl set image deployment/users-deployment users=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_USERS }}:latest --record || true
          kubectl set image deployment/gateway-deployment gateway=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_GATEWAY }}:latest --record || true
          kubectl set image deployment/email-worker-deployment email-worker=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_EMAIL_WORKER }}:latest --record || true
      - name: Rollout status
        run: |
          kubectl rollout status deployment/auth-deployment --timeout=120s || true
          kubectl rollout status deployment/users-deployment --timeout=120s || true
          kubectl rollout status deployment/gateway-deployment --timeout=120s || true
          kubectl rollout status deployment/email-worker-deployment --timeout=120s || true
